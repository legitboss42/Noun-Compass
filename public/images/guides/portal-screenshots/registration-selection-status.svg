<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Course and exam selection screenshot status</title>
  <desc id="desc">An editorial notice explaining that a privacy-safe active selection screen was unavailable.</desc>
  <rect width="1200" height="675" fill="#f3f7f4"/>
  <rect x="72" y="72" width="1056" height="531" rx="20" fill="#fff" stroke="#08783f" stroke-width="3"/>
  <rect x="72" y="72" width="1056" height="16" rx="8" fill="#08783f"/>
  <circle cx="170" cy="205" r="54" fill="#e7f5ec"/>
  <path d="M170 168v42m0 32v3" stroke="#08783f" stroke-width="14" stroke-linecap="round"/>
  <text x="260" y="185" fill="#08783f" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="2">CURRENT PORTAL STATUS</text>
  <text x="260" y="245" fill="#101713" font-family="Arial, sans-serif" font-size="42" font-weight="700">Active selection view unavailable</text>
  <text x="260" y="305" fill="#4f6257" font-family="Arial, sans-serif" font-size="25">On the demonstration account, semester registration had not been</text>
  <text x="260" y="344" fill="#4f6257" font-family="Arial, sans-serif" font-size="25">completed, so the portal did not display selectable course or exam rows.</text>
  <rect x="260" y="395" width="770" height="112" rx="12" fill="#fff8e2" stroke="#f4c95d" stroke-width="2"/>
  <text x="292" y="438" fill="#5c4a15" font-family="Arial, sans-serif" font-size="23" font-weight="700">What students should do</text>
  <text x="292" y="477" fill="#5c4a15" font-family="Arial, sans-serif" font-size="21">Confirm the current portal status and complete required steps before selection.</text>
  <text x="260" y="558" fill="#617067" font-family="Arial, sans-serif" font-size="19">Checked 14 June 2026. This visual will be replaced when a privacy-safe active view is available.</text>
</svg>
