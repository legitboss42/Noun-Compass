<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Official public source verification status</title>
  <desc id="desc">An editorial notice explaining that source pages can change and must be verified.</desc>
  <rect width="1200" height="675" fill="#f3f7f4"/>
  <rect x="72" y="72" width="1056" height="531" rx="20" fill="#fff" stroke="#08783f" stroke-width="3"/>
  <rect x="72" y="72" width="1056" height="16" rx="8" fill="#08783f"/>
  <circle cx="170" cy="205" r="54" fill="#e7f5ec"/>
  <circle cx="170" cy="205" r="31" fill="none" stroke="#08783f" stroke-width="7"/>
  <path d="M192 228l31 31" stroke="#08783f" stroke-width="8" stroke-linecap="round"/>
  <text x="260" y="185" fill="#08783f" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="2">OFFICIAL SOURCE CHECK</text>
  <text x="260" y="245" fill="#101713" font-family="Arial, sans-serif" font-size="42" font-weight="700">Verify the current public source</text>
  <text x="260" y="305" fill="#4f6257" font-family="Arial, sans-serif" font-size="25">Directories, admission pages, and course-material pages can change.</text>
  <text x="260" y="344" fill="#4f6257" font-family="Arial, sans-serif" font-size="25">Use the official-source link in this guide before relying on a screenshot.</text>
  <rect x="260" y="395" width="770" height="112" rx="12" fill="#fff8e2" stroke="#f4c95d" stroke-width="2"/>
  <text x="292" y="438" fill="#5c4a15" font-family="Arial, sans-serif" font-size="23" font-weight="700">Why this notice appears</text>
  <text x="292" y="477" fill="#5c4a15" font-family="Arial, sans-serif" font-size="21">A current source is more reliable than an older screenshot of the same page.</text>
  <text x="260" y="558" fill="#617067" font-family="Arial, sans-serif" font-size="19">Checked 14 June 2026. NOUN Compass is an independent student resource.</text>
</svg>
