name: Encrypted Supabase backup

on:
  schedule:
    - cron: "30 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
    steps:
      - name: Validate backup secrets
        shell: bash
        run: |
          test -n "$SUPABASE_DB_URL"
          test -n "$BACKUP_PASSPHRASE"
      - name: Dump and encrypt database
        shell: bash
        run: |
          stamp="$(date -u +%Y%m%dT%H%M%SZ)"
          pg_dump --data-only --no-owner --no-privileges "$SUPABASE_DB_URL" | gzip > "nouncompass-${stamp}.sql.gz"
          openssl enc -aes-256-cbc -salt -pbkdf2 -in "nouncompass-${stamp}.sql.gz" -out "nouncompass-${stamp}.sql.gz.enc" -pass env:BACKUP_PASSPHRASE
          rm "nouncompass-${stamp}.sql.gz"
      - name: Upload encrypted artifact
        uses: actions/upload-artifact@v4
        with:
          name: nouncompass-supabase-backup
          path: "*.sql.gz.enc"
          retention-days: 30
          if-no-files-found: error
