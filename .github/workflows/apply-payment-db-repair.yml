name: Apply payment database repair

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate database secret
        shell: bash
        run: test -n "$SUPABASE_DB_URL"

      - name: Apply payment grants and seed repair
        shell: bash
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL="$SUPABASE_DB_URL" \
            -v "$PWD:/workspace:ro" \
            -w /workspace \
            postgres:17-alpine \
            psql -v ON_ERROR_STOP=1 "$SUPABASE_DB_URL" -f supabase/migrations/202607200002_service_role_payment_privileges.sql

      - name: Verify payment repair
        shell: bash
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL="$SUPABASE_DB_URL" \
            postgres:17-alpine \
            sh -c 'test "$(psql -At "$SUPABASE_DB_URL" -c "select count(*) from public.membership_plans where plan_key = '\''semester-pass'\'' and amount_kobo = 250000 and currency = '\''NGN'\'' and active")" = "1"'
