name: Clean up temporary E2E users

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - name: Validate database secret
        shell: bash
        run: test -n "$SUPABASE_DB_URL"

      - name: Delete temporary NounCompass test users
        shell: bash
        run: |
          docker run --rm \
            -e SUPABASE_DB_URL="$SUPABASE_DB_URL" \
            postgres:17-alpine \
            sh -c 'psql -v ON_ERROR_STOP=1 "$SUPABASE_DB_URL" -c "delete from auth.users where email like '\''e2e-%@nouncompass.me'\'';"'
